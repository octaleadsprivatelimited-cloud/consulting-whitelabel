<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-direct" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="100%" stop-color="#002d72" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0076d6" />
      <stop offset="100%" stop-color="#00c6ff" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-direct)" />
  
  <!-- Grid background lines -->
  <path d="M 0,25 L 400,25 M 0,50 L 400,50 M 0,75 L 400,75 M 0,100 L 400,100 M 0,125 L 400,125 M 0,150 L 400,150 M 0,175 L 400,175 M 0,200 L 400,200 M 0,225 L 400,225" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <path d="M 25,0 L 25,250 M 50,0 L 50,250 M 75,0 L 75,250 M 100,0 L 100,250 M 125,0 L 125,250 M 150,0 L 150,250 M 175,0 L 175,250 M 200,0 L 200,250 M 225,0 L 225,250 M 250,0 L 250,250 M 275,0 L 275,250 M 300,0 L 300,250 M 325,0 L 325,250 M 350,0 L 350,250 M 375,0 L 375,250" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- Target & Placement Ring -->
  <circle cx="200" cy="140" r="45" fill="none" stroke="rgba(0, 118, 214, 0.2)" stroke-width="8" />
  <circle cx="200" cy="140" r="35" fill="none" stroke="url(#glow-grad)" stroke-width="3" stroke-dasharray="6 3" />
  <circle cx="200" cy="140" r="8" fill="#ffffff" />
  
  <!-- Handshake/Agreement icon representation -->
  <path d="M 175,140 Q 185,130 200,140 T 225,140" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  
  <!-- Vetted Candidates around the placement ring -->
  <g transform="translate(140, 105)">
    <circle cx="0" cy="0" r="14" fill="#0d1527" stroke="#0076d6" stroke-width="1.5" />
    <path d="M -5,6 C -5,2 -1,0 0,0 C 1,0 5,2 5,6 Z M 0,-3 C 2,-3 2,-7 0,-7 C -2,-7 -2,-3 0,-3 Z" fill="#ffffff" />
    <circle cx="7" cy="-7" r="4" fill="#22c55e" />
  </g>
  <g transform="translate(260, 105)">
    <circle cx="0" cy="0" r="14" fill="#0d1527" stroke="#0076d6" stroke-width="1.5" />
    <path d="M -5,6 C -5,2 -1,0 0,0 C 1,0 5,2 5,6 Z M 0,-3 C 2,-3 2,-7 0,-7 C -2,-7 -2,-3 0,-3 Z" fill="#ffffff" />
    <circle cx="7" cy="-7" r="4" fill="#22c55e" />
  </g>
  <g transform="translate(200, 195)">
    <circle cx="0" cy="0" r="14" fill="#0d1527" stroke="#0076d6" stroke-width="1.5" />
    <path d="M -5,6 C -5,2 -1,0 0,0 C 1,0 5,2 5,6 Z M 0,-3 C 2,-3 2,-7 0,-7 C -2,-7 -2,-3 0,-3 Z" fill="#ffffff" />
    <circle cx="7" cy="-7" r="4" fill="#22c55e" />
  </g>

  <!-- Title Overlay -->
  <text x="200" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#ffffff" font-weight="800" letter-spacing="1" text-anchor="middle">DIRECT HIRE PLACEMENT</text>
  <text x="200" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#0076d6" font-weight="bold" letter-spacing="2" text-anchor="middle">PERMANENT TECHNICAL RECRUITING</text>
</svg>
