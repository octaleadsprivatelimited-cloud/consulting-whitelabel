<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-vetting" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="100%" stop-color="#002d72" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0076d6" />
      <stop offset="100%" stop-color="#00c6ff" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-vetting)" />
  
  <!-- Grid background lines -->
  <path d="M 0,25 L 400,25 M 0,50 L 400,50 M 0,75 L 400,75 M 0,100 L 400,100 M 0,125 L 400,125 M 0,150 L 400,150 M 0,175 L 400,175 M 0,200 L 400,200 M 0,225 L 400,225" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <path d="M 25,0 L 25,250 M 50,0 L 50,250 M 75,0 L 75,250 M 100,0 L 100,250 M 125,0 L 125,250 M 150,0 L 150,250 M 175,0 L 175,250 M 200,0 L 200,250 M 225,0 L 225,250 M 250,0 L 250,250 M 275,0 L 275,250 M 300,0 L 300,250 M 325,0 L 325,250 M 350,0 L 350,250 M 375,0 L 375,250" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- Code Editor Window -->
  <rect x="70" y="95" width="160" height="110" fill="#050b18" stroke="#0076d6" stroke-width="2" rx="4" />
  <rect x="70" y="95" width="160" height="15" fill="#0d1527" />
  <circle cx="78" cy="102" r="3" fill="#ef4444" />
  <circle cx="86" cy="102" r="3" fill="#eab308" />
  <circle cx="94" cy="102" r="3" fill="#22c55e" />
  <text x="150" y="106" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">vetting_assessment.ts</text>
  
  <!-- Dummy Code lines -->
  <text x="80" y="130" font-family="Courier, monospace" font-size="8" fill="#eab308">const</text>
  <text x="110" y="130" font-family="Courier, monospace" font-size="8" fill="#ffffff">developer = {</text>
  <text x="90" y="145" font-family="Courier, monospace" font-size="8" fill="#0076d6">score:</text>
  <text x="125" y="145" font-family="Courier, monospace" font-size="8" fill="#22c55e">98</text>
  <text x="135" y="145" font-family="Courier, monospace" font-size="8" fill="#ffffff">,</text>
  <text x="90" y="160" font-family="Courier, monospace" font-size="8" fill="#0076d6">status:</text>
  <text x="130" y="160" font-family="Courier, monospace" font-size="8" fill="#a855f7">"Vetted"</text>
  <text x="80" y="175" font-family="Courier, monospace" font-size="8" fill="#ffffff">};</text>

  <!-- Evaluation Checklist Panel -->
  <rect x="250" y="95" width="80" height="110" fill="#050b18" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" rx="3" />
  
  <text x="290" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#ffffff" font-weight="bold" text-anchor="middle">CHECKLIST</text>
  
  <!-- Checkmark items -->
  <circle cx="264" cy="132" r="4" fill="#22c55e" />
  <path d="M 262.5,132 L 263.5,133 L 265.5,131" fill="none" stroke="#ffffff" stroke-width="1" />
  <text x="274" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="7" fill="#94a3b8">Clean Code</text>

  <circle cx="264" cy="152" r="4" fill="#22c55e" />
  <path d="M 262.5,152 L 263.5,153 L 265.5,151" fill="none" stroke="#ffffff" stroke-width="1" />
  <text x="274" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="7" fill="#94a3b8">Architecture</text>

  <circle cx="264" cy="172" r="4" fill="#22c55e" />
  <path d="M 262.5,172 L 263.5,173 L 265.5,171" fill="none" stroke="#ffffff" stroke-width="1" />
  <text x="274" y="175" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="7" fill="#94a3b8">Soft Skills</text>

  <!-- Title Overlay -->
  <text x="200" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#ffffff" font-weight="800" letter-spacing="1" text-anchor="middle">TECH VETTING &amp; CLINIC</text>
  <text x="200" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#0076d6" font-weight="bold" letter-spacing="2" text-anchor="middle">STANDARDIZED DEVELOPER SCREENINGS</text>
</svg>
