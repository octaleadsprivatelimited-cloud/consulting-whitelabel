<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-rpo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="100%" stop-color="#002d72" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0076d6" />
      <stop offset="100%" stop-color="#00c6ff" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-rpo)" />
  
  <!-- Grid background lines -->
  <path d="M 0,25 L 400,25 M 0,50 L 400,50 M 0,75 L 400,75 M 0,100 L 400,100 M 0,125 L 400,125 M 0,150 L 400,150 M 0,175 L 400,175 M 0,200 L 400,200 M 0,225 L 400,225" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <path d="M 25,0 L 25,250 M 50,0 L 50,250 M 75,0 L 75,250 M 100,0 L 100,250 M 125,0 L 125,250 M 150,0 L 150,250 M 175,0 L 175,250 M 200,0 L 200,250 M 225,0 L 225,250 M 250,0 L 250,250 M 275,0 L 275,250 M 300,0 L 300,250 M 325,0 L 325,250 M 350,0 L 350,250 M 375,0 L 375,250" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- Funnel representation -->
  <path d="M 120,100 L 280,100 L 240,180 L 160,180 Z" fill="none" stroke="url(#glow-grad)" stroke-width="3" />
  
  <!-- Funnel internal dividers -->
  <line x1="140" y1="130" x2="260" y2="130" stroke="rgba(255,255,255,0.15)" stroke-width="2" />
  <line x1="150" y1="155" x2="250" y2="155" stroke="rgba(255,255,255,0.15)" stroke-width="2" />

  <!-- Sourcing/funnel labels -->
  <text x="200" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#ffffff" font-weight="bold" text-anchor="middle">1. SOURCE</text>
  <text x="200" y="144" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#ffffff" font-weight="bold" text-anchor="middle">2. VET & SCREEN</text>
  <text x="200" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#ffffff" font-weight="bold" text-anchor="middle">3. INTERVIEW</text>

  <!-- Hired candidate emerging from funnel -->
  <g transform="translate(200, 205)">
    <circle cx="0" cy="0" r="10" fill="#22c55e" />
    <path d="M -3.5,0.5 L -1,3 L 4,-2" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    <text x="0" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#22c55e" font-weight="bold" text-anchor="middle">PLACEMENT SUCCESS</text>
  </g>

  <!-- Title Overlay -->
  <text x="200" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#ffffff" font-weight="800" letter-spacing="1" text-anchor="middle">RECRUITMENT PROCESS RPO</text>
  <text x="200" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#0076d6" font-weight="bold" letter-spacing="2" text-anchor="middle">END-TO-END PIPELINE MANAGEMENT</text>
</svg>
