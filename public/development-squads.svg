<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-squads" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="100%" stop-color="#002d72" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0076d6" />
      <stop offset="100%" stop-color="#00c6ff" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-squads)" />
  
  <!-- Grid background lines -->
  <path d="M 0,25 L 400,25 M 0,50 L 400,50 M 0,75 L 400,75 M 0,100 L 400,100 M 0,125 L 400,125 M 0,150 L 400,150 M 0,175 L 400,175 M 0,200 L 400,200 M 0,225 L 400,225" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <path d="M 25,0 L 25,250 M 50,0 L 50,250 M 75,0 L 75,250 M 100,0 L 100,250 M 125,0 L 125,250 M 150,0 L 150,250 M 175,0 L 175,250 M 200,0 L 200,250 M 225,0 L 225,250 M 250,0 L 250,250 M 275,0 L 275,250 M 300,0 L 300,250 M 325,0 L 325,250 M 350,0 L 350,250 M 375,0 L 375,250" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- Agile Loop / Team Connections -->
  <path d="M 130,140 Q 200,90 270,140 T 130,140" fill="none" stroke="url(#glow-grad)" stroke-width="2.5" stroke-dasharray="5 3" />

  <!-- Team Members (Avatars) -->
  <g transform="translate(130, 140)">
    <circle cx="0" cy="0" r="20" fill="#0d1527" stroke="#0076d6" stroke-width="2" />
    <path d="M -7,8 C -7,3 -2,1 0,1 C 2,1 7,3 7,8 Z M 0,-2 C 2.5,-2 2.5,-7 0,-7 C -2.5,-7 -2.5,-2 0,-2 Z" fill="#ffffff" />
    <text x="0" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#94a3b8" font-weight="bold" text-anchor="middle">Software Dev</text>
  </g>
  
  <g transform="translate(200, 105)">
    <circle cx="0" cy="0" r="20" fill="#0d1527" stroke="#0076d6" stroke-width="2" />
    <path d="M -7,8 C -7,3 -2,1 0,1 C 2,1 7,3 7,8 Z M 0,-2 C 2.5,-2 2.5,-7 0,-7 C -2.5,-7 -2.5,-2 0,-2 Z" fill="#ffffff" />
    <text x="0" y="-28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#0076d6" font-weight="bold" text-anchor="middle">Product Manager</text>
  </g>

  <g transform="translate(270, 140)">
    <circle cx="0" cy="0" r="20" fill="#0d1527" stroke="#0076d6" stroke-width="2" />
    <path d="M -7,8 C -7,3 -2,1 0,1 C 2,1 7,3 7,8 Z M 0,-2 C 2.5,-2 2.5,-7 0,-7 C -2.5,-7 -2.5,-2 0,-2 Z" fill="#ffffff" />
    <text x="0" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#94a3b8" font-weight="bold" text-anchor="middle">QA Engineer</text>
  </g>

  <!-- Title Overlay -->
  <text x="200" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#ffffff" font-weight="800" letter-spacing="1" text-anchor="middle">DEDICATED TECH SQUADS</text>
  <text x="200" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#0076d6" font-weight="bold" letter-spacing="2" text-anchor="middle">COHESIVE CROSS-FUNCTIONAL TEAMS</text>
</svg>
