<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-soft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="100%" stop-color="#002d72" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-soft)" />
  
  <!-- Grid background lines -->
  <path d="M 0,25 L 400,25 M 0,50 L 400,50 M 0,75 L 400,75 M 0,100 L 400,100 M 0,125 L 400,125 M 0,150 L 400,150 M 0,175 L 400,175 M 0,200 L 400,200 M 0,225 L 400,225" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <path d="M 25,0 L 25,250 M 50,0 L 50,250 M 75,0 L 75,250 M 100,0 L 100,250 M 125,0 L 125,250 M 150,0 L 150,250 M 175,0 L 175,250 M 200,0 L 200,250 M 225,0 L 225,250 M 250,0 L 250,250 M 275,0 L 275,250 M 300,0 L 300,250 M 325,0 L 325,250 M 350,0 L 350,250 M 375,0 L 375,250" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- Code editor mockup -->
  <g transform="translate(100, 110)">
    <rect x="0" y="0" width="200" height="90" fill="#050b18" stroke="#38bdf8" stroke-width="1.5" rx="3" />
    <rect x="0" y="0" width="200" height="12" fill="#0d1527" />
    <circle cx="8" cy="6" r="2" fill="#ef4444" />
    <circle cx="14" cy="6" r="2" fill="#eab308" />
    <circle cx="20" cy="6" r="2" fill="#22c55e" />
    
    <!-- Code lines -->
    <text x="10" y="25" font-family="Courier, monospace" font-size="8" fill="#38bdf8">import</text>
    <text x="45" y="25" font-family="Courier, monospace" font-size="8" fill="#ffffff">React</text>
    <text x="75" y="25" font-family="Courier, monospace" font-size="8" fill="#38bdf8">from</text>
    <text x="100" y="25" font-family="Courier, monospace" font-size="8" fill="#22c55e">"react"</text>
    <text x="10" y="40" font-family="Courier, monospace" font-size="8" fill="#eab308">export const</text>
    <text x="75" y="40" font-family="Courier, monospace" font-size="8" fill="#60a5fa">App</text>
    <text x="95" y="40" font-family="Courier, monospace" font-size="8" fill="#ffffff">= () =&gt; {</text>
    <text x="20" y="55" font-family="Courier, monospace" font-size="8" fill="#a855f7">return</text>
    <text x="55" y="55" font-family="Courier, monospace" font-size="8" fill="#38bdf8">&lt;div</text>
    <text x="80" y="55" font-family="Courier, monospace" font-size="8" fill="#eab308">className</text>
    <text x="125" y="55" font-family="Courier, monospace" font-size="8" fill="#22c55e">"flex"</text>
    <text x="150" y="55" font-family="Courier, monospace" font-size="8" fill="#38bdf8">&gt;</text>
  </g>

  <!-- Floating React logo representation -->
  <g transform="translate(320, 150)" opacity="0.8">
    <ellipse cx="0" cy="0" rx="25" ry="8" fill="none" stroke="#38bdf8" stroke-width="1.5" transform="rotate(30)" />
    <ellipse cx="0" cy="0" rx="25" ry="8" fill="none" stroke="#38bdf8" stroke-width="1.5" transform="rotate(90)" />
    <ellipse cx="0" cy="0" rx="25" ry="8" fill="none" stroke="#38bdf8" stroke-width="1.5" transform="rotate(150)" />
    <circle cx="0" cy="0" r="4" fill="#38bdf8" />
  </g>

  <!-- Title Overlay -->
  <text x="200" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#ffffff" font-weight="800" letter-spacing="1" text-anchor="middle">SOFTWARE ENGINEERING</text>
  <text x="200" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#38bdf8" font-weight="bold" letter-spacing="2" text-anchor="middle">FULL-STACK &amp; SYSTEM RECRUITMENT</text>
</svg>
