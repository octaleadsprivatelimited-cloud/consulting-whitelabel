<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-devops" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="100%" stop-color="#002d72" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0076d6" />
      <stop offset="100%" stop-color="#00c6ff" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-devops)" />
  
  <!-- Grid background lines -->
  <path d="M 0,25 L 400,25 M 0,50 L 400,50 M 0,75 L 400,75 M 0,100 L 400,100 M 0,125 L 400,125 M 0,150 L 400,150 M 0,175 L 400,175 M 0,200 L 400,200 M 0,225 L 400,225" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <path d="M 25,0 L 25,250 M 50,0 L 50,250 M 75,0 L 75,250 M 100,0 L 100,250 M 125,0 L 125,250 M 150,0 L 150,250 M 175,0 L 175,250 M 200,0 L 200,250 M 225,0 L 225,250 M 250,0 L 250,250 M 275,0 L 275,250 M 300,0 L 300,250 M 325,0 L 325,250 M 350,0 L 350,250 M 375,0 L 375,250" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- Cloud outline -->
  <path d="M 170,120 A 20,20 0 0,1 200,110 A 25,25 0 0,1 240,125 A 20,20 0 0,1 245,150 A 15,15 0 0,1 230,165 L 170,165 A 15,15 0 0,1 155,150 A 20,20 0 0,1 170,120 Z" fill="none" stroke="url(#glow-grad)" stroke-width="3" />
  
  <!-- DevOps Infinity Loop -->
  <path d="M 150,145 C 130,125 110,125 90,145 C 70,165 90,185 110,185 C 130,185 150,145 170,145 C 190,145 210,185 230,185 C 250,185 270,165 250,145 C 230,125 210,125 190,145" fill="none" stroke="rgba(255, 255, 255, 0.3)" stroke-width="2" stroke-dasharray="4 2" />

  <!-- Kubernetes gear wheel visual outline on right -->
  <g transform="translate(300, 145)" opacity="0.8">
    <circle cx="0" cy="0" r="16" fill="none" stroke="#0076d6" stroke-width="2.5" />
    <circle cx="0" cy="-20" r="4" fill="#0076d6" />
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#0076d6" stroke-width="2" />
    
    <circle cx="17" cy="-10" r="4" fill="#0076d6" />
    <line x1="15" y1="-8" x2="-15" y2="8" stroke="#0076d6" stroke-width="2" />
    
    <circle cx="17" cy="10" r="4" fill="#0076d6" />
    <line x1="15" y1="8" x2="-15" y2="-8" stroke="#0076d6" stroke-width="2" />
  </g>

  <!-- Title Overlay -->
  <text x="200" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#ffffff" font-weight="800" letter-spacing="1" text-anchor="middle">CLOUD &amp; DEVOPS</text>
  <text x="200" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#0076d6" font-weight="bold" letter-spacing="2" text-anchor="middle">INFRASTRUCTURE, CI/CD &amp; IAAS RECRUITING</text>
</svg>
