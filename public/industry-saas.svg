<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-saas" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="100%" stop-color="#002d72" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0076d6" />
      <stop offset="100%" stop-color="#00c6ff" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-saas)" />
  
  <!-- Grid background lines -->
  <path d="M 0,25 L 400,25 M 0,50 L 400,50 M 0,75 L 400,75 M 0,100 L 400,100 M 0,125 L 400,125 M 0,150 L 400,150 M 0,175 L 400,175 M 0,200 L 400,200 M 0,225 L 400,225" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <path d="M 25,0 L 25,250 M 50,0 L 50,250 M 75,0 L 75,250 M 100,0 L 100,250 M 125,0 L 125,250 M 150,0 L 150,250 M 175,0 L 175,250 M 200,0 L 200,250 M 225,0 L 225,250 M 250,0 L 250,250 M 275,0 L 275,250 M 300,0 L 300,250 M 325,0 L 325,250 M 350,0 L 350,250 M 375,0 L 375,250" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- SaaS Dashboard Layout Mockup -->
  <rect x="70" y="95" width="260" height="110" fill="#050b18" stroke="#0076d6" stroke-width="2" rx="4" />
  <rect x="70" y="95" width="260" height="15" fill="#0d1527" />
  <circle cx="78" cy="102" r="3" fill="#ef4444" />
  <circle cx="86" cy="102" r="3" fill="#eab308" />
  <circle cx="94" cy="102" r="3" fill="#22c55e" />
  
  <!-- Dashboard Sidebar -->
  <rect x="70" y="110" width="45" height="95" fill="#090f1d" />
  <rect x="75" y="120" width="35" height="4" fill="rgba(255,255,255,0.2)" />
  <rect x="75" y="130" width="35" height="4" fill="rgba(255,255,255,0.2)" />
  <rect x="75" y="140" width="35" height="4" fill="rgba(255,255,255,0.2)" />
  
  <!-- Dashboard Grid Cards -->
  <rect x="125" y="120" width="90" height="35" fill="#0d1527" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <rect x="225" y="120" width="90" height="35" fill="#0d1527" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <rect x="125" y="162" width="190" height="35" fill="#0d1527" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  
  <!-- Waveform / chart mockup inside card -->
  <path d="M 135,185 C 150,175 160,190 180,175 C 200,165 210,185 230,170 C 250,160 260,180 280,170 C 290,165 300,175 310,172" fill="none" stroke="url(#glow-grad)" stroke-width="2" />

  <!-- Title Overlay -->
  <text x="200" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#ffffff" font-weight="800" letter-spacing="1" text-anchor="middle">SOFTWARE &amp; SAAS</text>
  <text x="200" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#0076d6" font-weight="bold" letter-spacing="2" text-anchor="middle">PRODUCT DEVELOPMENT &amp; TECH SYSTEMS</text>
</svg>
