<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-eor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="100%" stop-color="#002d72" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0076d6" />
      <stop offset="100%" stop-color="#00c6ff" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-eor)" />
  
  <!-- Grid background lines -->
  <path d="M 0,25 L 400,25 M 0,50 L 400,50 M 0,75 L 400,75 M 0,100 L 400,100 M 0,125 L 400,125 M 0,150 L 400,150 M 0,175 L 400,175 M 0,200 L 400,200 M 0,225 L 400,225" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <path d="M 25,0 L 25,250 M 50,0 L 50,250 M 75,0 L 75,250 M 100,0 L 100,250 M 125,0 L 125,250 M 150,0 L 150,250 M 175,0 L 175,250 M 200,0 L 200,250 M 225,0 L 225,250 M 250,0 L 250,250 M 275,0 L 275,250 M 300,0 L 300,250 M 325,0 L 325,250 M 350,0 L 350,250 M 375,0 L 375,250" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- Shield illustration (representing legal safety & compliance) -->
  <g transform="translate(200, 140)">
    <path d="M -25,-35 L 25,-35 L 25,-10 C 25,15 0,35 0,35 C 0,35 -25,15 -25,-10 Z" fill="none" stroke="url(#glow-grad)" stroke-width="3.5" />
    <!-- Checkmark inside shield -->
    <path d="M -10,0 L -2,8 L 10,-6" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Contract paper icon on left -->
  <g transform="translate(110, 140)">
    <rect x="-20" y="-28" width="40" height="56" fill="#0d1527" stroke="#0076d6" stroke-width="2" rx="2" />
    <line x1="-12" y1="-16" x2="12" y2="-16" stroke="#ffffff" stroke-width="2" />
    <line x1="-12" y1="-6" x2="4" y2="-6" stroke="#ffffff" stroke-width="2" />
    <line x1="-12" y1="4" x2="8" y2="4" stroke="#ffffff" stroke-width="2" />
  </g>

  <!-- Money / card representing payroll on right -->
  <g transform="translate(290, 140)">
    <rect x="-24" y="-16" width="48" height="32" fill="#0d1527" stroke="#0076d6" stroke-width="2" rx="2" />
    <circle cx="-10" cy="0" r="4" fill="#22c55e" />
    <line x1="2" y1="-6" x2="16" y2="-6" stroke="#ffffff" stroke-width="1.5" />
    <line x1="2" y1="2" x2="12" y2="2" stroke="#ffffff" stroke-width="1.5" />
  </g>

  <!-- Title Overlay -->
  <text x="200" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#ffffff" font-weight="800" letter-spacing="1" text-anchor="middle">GLOBAL EOR SOLUTIONS</text>
  <text x="200" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#0076d6" font-weight="bold" letter-spacing="2" text-anchor="middle">COMPLIANT GLOBAL PAYROLL &amp; ONBOARDING</text>
</svg>
