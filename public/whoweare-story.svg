<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-story" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="100%" stop-color="#002d72" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0076d6" />
      <stop offset="100%" stop-color="#00c6ff" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-story)" />
  
  <!-- Grid background lines -->
  <path d="M 0,25 L 400,25 M 0,50 L 400,50 M 0,75 L 400,75 M 0,100 L 400,100 M 0,125 L 400,125 M 0,150 L 400,150 M 0,175 L 400,175 M 0,200 L 400,200 M 0,225 L 400,225" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <path d="M 25,0 L 25,250 M 50,0 L 50,250 M 75,0 L 75,250 M 100,0 L 100,250 M 125,0 L 125,250 M 150,0 L 150,250 M 175,0 L 175,250 M 200,0 L 200,250 M 225,0 L 225,250 M 250,0 L 250,250 M 275,0 L 275,250 M 300,0 L 300,250 M 325,0 L 325,250 M 350,0 L 350,250 M 375,0 L 375,250" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- Collaborative Team Nodes -->
  <g transform="translate(200, 140)">
    <!-- Central Connection Circle -->
    <circle cx="0" cy="0" r="32" fill="none" stroke="url(#glow-grad)" stroke-width="2" stroke-dasharray="4 2" />
    
    <!-- Core Hub -->
    <circle cx="0" cy="0" r="14" fill="#ffffff" />
    <path d="M -5,4 L 5,4 M -5,0 L 5,0 M -5,-4 L 5,-4" stroke="#002d72" stroke-width="2" stroke-linecap="round" />
    
    <!-- Surrounding Team Members (Connected) -->
    <!-- Team Member 1 -->
    <g transform="translate(-45, -25)">
      <circle cx="0" cy="0" r="14" fill="#0d1527" stroke="#0076d6" stroke-width="2" />
      <path d="M -5,5 C -5,2 -1,0 0,0 C 1,0 5,2 5,5 Z M 0,-2 C 1.5,-2 1.5,-5 0,-5 C -1.5,-5 -1.5,-2 0,-2 Z" fill="#ffffff" />
    </g>
    <!-- Team Member 2 -->
    <g transform="translate(45, -25)">
      <circle cx="0" cy="0" r="14" fill="#0d1527" stroke="#0076d6" stroke-width="2" />
      <path d="M -5,5 C -5,2 -1,0 0,0 C 1,0 5,2 5,5 Z M 0,-2 C 1.5,-2 1.5,-5 0,-5 C -1.5,-5 -1.5,-2 0,-2 Z" fill="#ffffff" />
    </g>
    <!-- Team Member 3 -->
    <g transform="translate(0, 45)">
      <circle cx="0" cy="0" r="14" fill="#0d1527" stroke="#0076d6" stroke-width="2" />
      <path d="M -5,5 C -5,2 -1,0 0,0 C 1,0 5,2 5,5 Z M 0,-2 C 1.5,-2 1.5,-5 0,-5 C -1.5,-5 -1.5,-2 0,-2 Z" fill="#ffffff" />
    </g>
    
    <!-- Connection lines -->
    <line x1="-31" y1="-17" x2="-10" y2="-5" stroke="#ffffff" stroke-width="1.5" opacity="0.5" />
    <line x1="31" y1="-17" x2="10" y2="-5" stroke="#ffffff" stroke-width="1.5" opacity="0.5" />
    <line x1="0" y1="31" x2="0" y2="14" stroke="#ffffff" stroke-width="1.5" opacity="0.5" />
  </g>

  <!-- Title Overlay -->
  <text x="200" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#ffffff" font-weight="800" letter-spacing="1" text-anchor="middle">OCTALEADS STORY</text>
  <text x="200" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#0076d6" font-weight="bold" letter-spacing="2" text-anchor="middle">CONNECTING IT TALENT GLOBALLY</text>
</svg>
