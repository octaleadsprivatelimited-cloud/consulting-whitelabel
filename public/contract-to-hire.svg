<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-c2h" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="100%" stop-color="#002d72" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0076d6" />
      <stop offset="100%" stop-color="#00c6ff" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-c2h)" />
  
  <!-- Grid background lines -->
  <path d="M 0,25 L 400,25 M 0,50 L 400,50 M 0,75 L 400,75 M 0,100 L 400,100 M 0,125 L 400,125 M 0,150 L 400,150 M 0,175 L 400,175 M 0,200 L 400,200 M 0,225 L 400,225" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <path d="M 25,0 L 25,250 M 50,0 L 50,250 M 75,0 L 75,250 M 100,0 L 100,250 M 125,0 L 125,250 M 150,0 L 150,250 M 175,0 L 175,250 M 200,0 L 200,250 M 225,0 L 225,250 M 250,0 L 250,250 M 275,0 L 275,250 M 300,0 L 300,250 M 325,0 L 325,250 M 350,0 L 350,250 M 375,0 L 375,250" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- Transition Arrow & Stages -->
  <path d="M 120,135 Q 200,90 280,135" fill="none" stroke="url(#glow-grad)" stroke-width="4" marker-end="url(#arrow)" />
  
  <!-- Step 1: Trial Contract -->
  <g transform="translate(100, 145)">
    <rect x="-35" y="-20" width="70" height="40" fill="#0d1527" stroke="#0076d6" stroke-width="2" />
    <text x="0" y="-3" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#ffffff" font-weight="bold" text-anchor="middle">1. TRIAL</text>
    <text x="0" y="9" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Contract (3-6mo)</text>
  </g>

  <!-- Step 2: Evaluation Vetting -->
  <g transform="translate(200, 100)">
    <circle cx="0" cy="0" r="18" fill="#0d1527" stroke="#0076d6" stroke-width="2" />
    <!-- Clock/Timer icon representation -->
    <circle cx="0" cy="0" r="8" fill="none" stroke="#ffffff" stroke-width="1.5" />
    <line x1="0" y1="0" x2="0" y2="-4" stroke="#ffffff" stroke-width="1.5" />
    <line x1="0" y1="0" x2="3" y2="2" stroke="#ffffff" stroke-width="1.5" />
    <text x="0" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#0076d6" font-weight="bold" text-anchor="middle">EVALUATE</text>
  </g>

  <!-- Step 3: Full-Time Placement -->
  <g transform="translate(300, 145)">
    <rect x="-35" y="-20" width="70" height="40" fill="#22c55e" rx="2" />
    <text x="0" y="-3" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#ffffff" font-weight="bold" text-anchor="middle">2. HIRE</text>
    <text x="0" y="9" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="7" fill="#ffffff" text-anchor="middle" opacity="0.9">Permanent FTE</text>
  </g>

  <!-- Title Overlay -->
  <text x="200" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#ffffff" font-weight="800" letter-spacing="1" text-anchor="middle">CONTRACT-TO-HIRE</text>
  <text x="200" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#0076d6" font-weight="bold" letter-spacing="2" text-anchor="middle">RISK-FREE TALENT EVALUATION</text>
</svg>
