<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-analytics" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="100%" stop-color="#002d72" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0076d6" />
      <stop offset="100%" stop-color="#00c6ff" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-analytics)" />
  
  <!-- Grid background lines -->
  <path d="M 0,25 L 400,25 M 0,50 L 400,50 M 0,75 L 400,75 M 0,100 L 400,100 M 0,125 L 400,125 M 0,150 L 400,150 M 0,175 L 400,175 M 0,200 L 400,200 M 0,225 L 400,225" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <path d="M 25,0 L 25,250 M 50,0 L 50,250 M 75,0 L 75,250 M 100,0 L 100,250 M 125,0 L 125,250 M 150,0 L 150,250 M 175,0 L 175,250 M 200,0 L 200,250 M 225,0 L 225,250 M 250,0 L 250,250 M 275,0 L 275,250 M 300,0 L 300,250 M 325,0 L 325,250 M 350,0 L 350,250 M 375,0 L 375,250" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- Analytics charts mockup -->
  <g transform="translate(100, 140)">
    <!-- Bar chart -->
    <rect x="-30" y="20" width="10" height="20" fill="url(#glow-grad)" />
    <rect x="-15" y="0" width="10" height="40" fill="url(#glow-grad)" />
    <rect x="0" y="-20" width="10" height="60" fill="url(#glow-grad)" />
    <rect x="15" y="10" width="10" height="30" fill="url(#glow-grad)" />
    <rect x="30" y="-10" width="10" height="50" fill="url(#glow-grad)" />
    <line x1="-40" y1="40" x2="45" y2="40" stroke="#ffffff" stroke-width="1.5" />
    <line x1="-40" y1="-30" x2="-40" y2="40" stroke="#ffffff" stroke-width="1.5" />
  </g>

  <!-- Circular Radar / Sourcing Target Chart on Right -->
  <g transform="translate(280, 140)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="url(#glow-grad)" stroke-width="2" stroke-dasharray="4 2" />
    <circle cx="0" cy="0" r="20" fill="none" stroke="url(#glow-grad)" stroke-width="1" />
    <line x1="-40" y1="0" x2="40" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
    <line x1="0" y1="-40" x2="0" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
    <circle cx="15" cy="-15" r="4" fill="#ef4444" />
    <circle cx="-20" cy="10" r="4" fill="#22c55e" />
  </g>

  <!-- Title Overlay -->
  <text x="200" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#ffffff" font-weight="800" letter-spacing="1" text-anchor="middle">TALENT MAP &amp; ANALYTICS</text>
  <text x="200" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#0076d6" font-weight="bold" letter-spacing="2" text-anchor="middle">MARKET INTELLIGENCE &amp; SALARY BENCHMARKING</text>
</svg>
