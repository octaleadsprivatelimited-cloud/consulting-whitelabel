<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-fintech" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="100%" stop-color="#002d72" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#4ade80" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-fintech)" />
  
  <!-- Grid background lines -->
  <path d="M 0,25 L 400,25 M 0,50 L 400,50 M 0,75 L 400,75 M 0,100 L 400,100 M 0,125 L 400,125 M 0,150 L 400,150 M 0,175 L 400,175 M 0,200 L 400,200 M 0,225 L 400,225" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <path d="M 25,0 L 25,250 M 50,0 L 50,250 M 75,0 L 75,250 M 100,0 L 100,250 M 125,0 L 125,250 M 150,0 L 150,250 M 175,0 L 175,250 M 200,0 L 200,250 M 225,0 L 225,250 M 250,0 L 250,250 M 275,0 L 275,250 M 300,0 L 300,250 M 325,0 L 325,250 M 350,0 L 350,250 M 375,0 L 375,250" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- Blockchain Connected Nodes -->
  <path d="M 120,150 L 200,105 L 280,150 L 200,195 Z M 200,105 L 200,195 M 120,150 L 280,150" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.3" />
  
  <!-- Main Coin/Token Center -->
  <circle cx="200" cy="150" r="30" fill="url(#glow-grad)" stroke="#ffffff" stroke-width="2.5" />
  <text x="200" y="158" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" fill="#ffffff" font-weight="bold" text-anchor="middle">$</text>

  <!-- Surrounding Blockchain block nodes -->
  <rect x="105" y="135" width="30" height="30" fill="#0d1527" stroke="#22c55e" stroke-width="2" rx="3" />
  <path d="M 112,150 L 128,150 M 120,142 L 120,158" fill="none" stroke="#ffffff" stroke-width="1.5" />

  <rect x="265" y="135" width="30" height="30" fill="#0d1527" stroke="#22c55e" stroke-width="2" rx="3" />
  <path d="M 275,153 L 280,145 L 285,150" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />

  <!-- Title Overlay -->
  <text x="200" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#ffffff" font-weight="800" letter-spacing="1" text-anchor="middle">FINTECH &amp; BLOCKCHAIN</text>
  <text x="200" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#22c55e" font-weight="bold" letter-spacing="2" text-anchor="middle">TRANSACTIONS &amp; DECENTRALIZED INFRASTRUCTURE</text>
</svg>
