<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-contract" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="100%" stop-color="#002d72" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0076d6" />
      <stop offset="100%" stop-color="#00c6ff" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-contract)" />
  
  <!-- Grid background lines -->
  <path d="M 0,25 L 400,25 M 0,50 L 400,50 M 0,75 L 400,75 M 0,100 L 400,100 M 0,125 L 400,125 M 0,150 L 400,150 M 0,175 L 400,175 M 0,200 L 400,200 M 0,225 L 400,225" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <path d="M 25,0 L 25,250 M 50,0 L 50,250 M 75,0 L 75,250 M 100,0 L 100,250 M 125,0 L 125,250 M 150,0 L 150,250 M 175,0 L 175,250 M 200,0 L 200,250 M 225,0 L 225,250 M 250,0 L 250,250 M 275,0 L 275,250 M 300,0 L 300,250 M 325,0 L 325,250 M 350,0 L 350,250 M 375,0 L 375,250" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- Network paths -->
  <path d="M 100,140 Q 200,90 300,140" fill="none" stroke="#0076d6" stroke-width="2" stroke-dasharray="4 4" opacity="0.4" />
  <path d="M 100,140 L 300,140" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
  
  <!-- Candidate Profiles (Nodes) -->
  <circle cx="100" cy="140" r="18" fill="#0d1527" stroke="#0076d6" stroke-width="2" />
  <path d="M 94,148 C 94,142 98,140 100,140 C 102,140 106,142 106,148 Z M 100,136 C 103,136 103,130 100,130 C 97,130 97,136 100,136 Z" fill="#ffffff" />
  <text x="100" y="175" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle" font-weight="bold">Contractor A</text>

  <circle cx="200" cy="110" r="24" fill="url(#glow-grad)" stroke="#ffffff" stroke-width="2" />
  <path d="M 192,120 C 192,112 198,110 200,110 C 202,110 208,112 208,120 Z M 200,105 C 204,105 204,97 200,97 C 196,97 196,105 200,105 Z" fill="#ffffff" />
  <text x="200" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">On-Demand Talent</text>

  <circle cx="300" cy="140" r="18" fill="#0d1527" stroke="#0076d6" stroke-width="2" />
  <path d="M 294,148 C 294,142 298,140 300,140 C 302,140 306,142 306,148 Z M 300,136 C 303,136 303,130 300,130 C 297,130 297,136 300,136 Z" fill="#ffffff" />
  <text x="300" y="175" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle" font-weight="bold">Contractor B</text>

  <!-- Title Overlay -->
  <text x="200" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#ffffff" font-weight="800" letter-spacing="1" text-anchor="middle">CONTRACT IT STAFFING</text>
  <text x="200" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#0076d6" font-weight="bold" letter-spacing="2" text-anchor="middle">FLEXIBLE ON-DEMAND DEVELOPERS</text>
</svg>
