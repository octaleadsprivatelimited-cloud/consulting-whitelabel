<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-health" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="100%" stop-color="#002d72" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#f87171" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-health)" />
  
  <!-- Grid background lines -->
  <path d="M 0,25 L 400,25 M 0,50 L 400,50 M 0,75 L 400,75 M 0,100 L 400,100 M 0,125 L 400,125 M 0,150 L 400,150 M 0,175 L 400,175 M 0,200 L 400,200 M 0,225 L 400,225" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <path d="M 25,0 L 25,250 M 50,0 L 50,250 M 75,0 L 75,250 M 100,0 L 100,250 M 125,0 L 125,250 M 150,0 L 150,250 M 175,0 L 175,250 M 200,0 L 200,250 M 225,0 L 225,250 M 250,0 L 250,250 M 275,0 L 275,250 M 300,0 L 300,250 M 325,0 L 325,250 M 350,0 L 350,250 M 375,0 L 375,250" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

  <!-- ECG Heartbeat Line -->
  <path d="M 70,150 L 140,150 L 150,120 L 160,180 L 170,140 L 180,155 L 190,150 L 330,150" fill="none" stroke="url(#glow-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- DNA Double Helix Representation (linked nodes) -->
  <g transform="translate(200, 100)" opacity="0.8">
    <path d="M -50,0 Q -25,-20 0,0 T 50,0" fill="none" stroke="#0076d6" stroke-width="2" />
    <path d="M -50,0 Q -25,20 0,0 T 50,0" fill="none" stroke="#ef4444" stroke-width="2" />
    <circle cx="-50" cy="0" r="4" fill="#0076d6" />
    <circle cx="-25" cy="-10" r="4" fill="#0076d6" />
    <circle cx="0" cy="0" r="4" fill="#0076d6" />
    <circle cx="25" cy="10" r="4" fill="#ef4444" />
    <circle cx="50" cy="0" r="4" fill="#ef4444" />
    
    <line x1="-25" y1="-10" x2="-25" y2="10" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
    <line x1="25" y1="-10" x2="25" y2="10" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  </g>

  <!-- Medical Cross / Shield icon -->
  <g transform="translate(200, 185)">
    <circle cx="0" cy="0" r="16" fill="#0d1527" stroke="#ef4444" stroke-width="2" />
    <path d="M -6,0 L 6,0 M 0,-6 L 0,6" fill="none" stroke="#ef4444" stroke-width="3.5" stroke-linecap="square" />
  </g>

  <!-- Title Overlay -->
  <text x="200" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#ffffff" font-weight="800" letter-spacing="1" text-anchor="middle">HEALTHCARE &amp; BIOTECH IT</text>
  <text x="200" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#ef4444" font-weight="bold" letter-spacing="2" text-anchor="middle">HIPAA COMPLIANT DIGITAL HEALTH SOLUTIONS</text>
</svg>
